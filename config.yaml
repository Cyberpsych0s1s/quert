# Quert crawler configuration.
# This is the default config loaded from ./config.yaml. Override any field via
# the -config flag, environment variables (CRAWLER_*), or CLI flags.
crawler:
  max_pages: 1000
  max_depth: 3
  concurrent_workers: 4
  request_timeout: 15s
  user_agent: "Quert/1.0 (+https://github.com/cyberpsych0s1s/quert)"
  # Starting URLs. Override with -seed on the command line.
  seed_urls:
    - "https://example.com"
  # include_patterns: if non-empty, a URL must match one of these regexes to be
  # crawled. Empty means "no include filter" (crawl anything not excluded).
  include_patterns: []
  # exclude_patterns: URLs matching any of these regexes are skipped.
  exclude_patterns:
    - ".*\\.(jpg|jpeg|png|gif|pdf|zip|mp4|mp3)$"
  # allowed_domains: if non-empty, restrict the crawl to these domains. Empty
  # means follow links to any domain (bounded by max_depth / max_pages).
  allowed_domains: []
  # blocked_domains: never crawl these domains.
  blocked_domains: []
  global_rate_limit: 10.0
  global_burst: 15
  per_host_rate_limit: 5.0
  per_host_burst: 10

rate_limit:
  requests_per_second: 1.5
  burst: 5
  per_host_limit: true
  default_delay: 2s
  adaptive: true
  respect_retry_after: true
  failure_threshold: 3
  recovery_timeout: 60s
  max_requests: 5

content:
  min_text_length: 50
  max_text_length: 50000
  languages: ["en", "es", "fr"]
  quality_threshold: 0.5
  remove_boilerplate: true
  extract_main_content: true
  preserve_formatting: false
  normalize_whitespace: true
  deduplication:
    enabled: true
    url_fingerprinting: true
    content_fingerprinting: true
    semantic_similarity: true
    similarity_threshold: 0.9

storage:
  type: "file"
  path: "./test_data"
  batch_size: 100
  compression: true
  file_format: "jsonl"

monitoring:
  log_level: "debug"
  log_format: "json"
  log_file: "./test_logs/crawler.log"
  log_rotation: true
  log_max_size: "10MB"
  log_max_backups: 3
  metrics_enabled: true
  metrics_port: 8081
  metrics_path: "/metrics"
  health_port: 8081
  health_path: "/health"
  enable_profiling: false
  profiling_port: 6061
  tracing_enabled: false
  jaeger_endpoint: "http://localhost:14268/api/traces"
  service_name: "test-crawler"
  tracing_sample_rate: 0.1

http:
  max_idle_connections: 100
  max_idle_connections_per_host: 10
  idle_connection_timeout: 30s
  disable_keep_alives: false
  timeout: 15s
  dial_timeout: 3s
  tls_handshake_timeout: 5s
  response_header_timeout: 5s
  disable_compression: false
  accept_encoding: "gzip, deflate"

frontier:
  queue_capacity: 10000
  priority_queues: 5
  politeness_queues: 100
  checkpoint_interval: 30s
  persistent_state: true
  url_normalization: true
  canonicalization: true
  remove_fragments: true
  sort_query_params: true

robots:
  enabled: true
  cache_duration: 12h
  user_agent: "*"
  crawl_delay_override: false
  respect_crawl_delay: true

redis:
  addr: "localhost:6380"
  password: ""
  db: 1
  pool_size: 5
  min_idle_connections: 2
  max_retries: 2
  retry_delay: 500ms

security:
  tls_insecure_skip_verify: false
  tls_min_version: "1.2"
  auth_enabled: false
  auth_type: "basic"
  auth_username: ""
  auth_password: ""
  auth_token: ""
  allowed_ips: []
  blocked_ips: []

features:
  javascript_rendering: false
  semantic_analysis: true
  content_classification: true
  multi_language_processing: true
  real_time_streaming: false